name: Release Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  VERSION: ${{ github.event_name == 'workflow_dispatch' && format('manual-{0}', github.run_number) || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Server
            runner: macos-latest
            platform: macos
            package_kind: server
            base_name: citebox
            archive_ext: .tar.gz
          - label: Linux Server
            runner: ubuntu-latest
            platform: linux
            package_kind: server
            base_name: citebox
            archive_ext: .tar.gz
          - label: Windows Server
            runner: windows-latest
            platform: windows
            package_kind: server
            base_name: citebox
            archive_ext: .zip
          - label: macOS Desktop
            runner: macos-latest
            platform: macos
            package_kind: desktop
            base_name: citebox-desktop
            archive_ext: .dmg
          - label: Linux Desktop
            runner: ubuntu-latest
            platform: linux
            package_kind: desktop
            base_name: citebox-desktop
            archive_ext: .tar.gz
          - label: Windows Desktop
            runner: windows-latest
            platform: windows
            package_kind: desktop
            base_name: citebox-desktop
            archive_ext: .exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux desktop build dependencies
        if: matrix.platform == 'linux' && matrix.package_kind == 'desktop'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev pkg-config

          if apt-cache show libwebkit2gtk-4.0-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.1-dev

            if ! pkg-config --exists webkit2gtk-4.0 && pkg-config --exists webkit2gtk-4.1; then
              mkdir -p "${RUNNER_TEMP}/pkgconfig"
              cp "$(pkg-config --variable=pcfiledir webkit2gtk-4.1)/webkit2gtk-4.1.pc" \
                "${RUNNER_TEMP}/pkgconfig/webkit2gtk-4.0.pc"
              export PKG_CONFIG_PATH="${RUNNER_TEMP}/pkgconfig${PKG_CONFIG_PATH:+:${PKG_CONFIG_PATH}}"
              echo "PKG_CONFIG_PATH=${PKG_CONFIG_PATH}" >> "${GITHUB_ENV}"
            fi
          fi

          pkg-config --modversion gtk+-3.0
          pkg-config --modversion webkit2gtk-4.0

      - name: Inspect native Windows desktop toolchain
        if: matrix.platform == 'windows' && matrix.package_kind == 'desktop'
        shell: pwsh
        run: |
          $tools = "gcc", "g++", "clang", "clang++", "cl"
          foreach ($tool in $tools) {
            $cmd = Get-Command $tool -ErrorAction SilentlyContinue
            if ($null -eq $cmd) {
              Write-Host "$tool => not found"
            } else {
              Write-Host "$tool => $($cmd.Source)"
            }
          }
          go env CC CXX CGO_ENABLED

      - name: Install NSIS
        if: matrix.platform == 'windows' && matrix.package_kind == 'desktop'
        shell: pwsh
        run: |
          choco install nsis -y --no-progress

          $nsisDirs = @(
            (Join-Path $env:ProgramFiles "NSIS"),
            (Join-Path ${env:ProgramFiles(x86)} "NSIS")
          )

          foreach ($dir in $nsisDirs) {
            if (Test-Path (Join-Path $dir "makensis.exe")) {
              Add-Content -Path $env:GITHUB_PATH -Value $dir
              Write-Host "Added NSIS to PATH: $dir"
              exit 0
            }
          }

          if ($env:ChocolateyInstall) {
            $makensis = Get-ChildItem `
              -Path (Join-Path $env:ChocolateyInstall "lib") `
              -Filter "makensis.exe" `
              -File `
              -Recurse `
              -ErrorAction SilentlyContinue |
              Select-Object -First 1 -ExpandProperty DirectoryName
            if ($makensis) {
              Add-Content -Path $env:GITHUB_PATH -Value $makensis
              Write-Host "Added NSIS to PATH: $makensis"
              exit 0
            }
          }

          throw "NSIS installed but makensis.exe was not found."

      - name: Import macOS signing certificate
        if: matrix.package_kind == 'desktop' && matrix.platform == 'macos'
        shell: bash
        env:
          MAC_CERT_P12_BASE64: ${{ secrets.MAC_CERT_P12_BASE64 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="${RUNNER_TEMP}/citebox-build.keychain-db"
          python3 -c 'import base64, os; open("cert.p12", "wb").write(base64.b64decode(os.environ["MAC_CERT_P12_BASE64"].strip()))'

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -s "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security import cert.p12 -k "${KEYCHAIN_PATH}" -P "${MAC_CERT_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcrun
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          echo "Codesigning identities after import:"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"
          codesign_identity="$(security find-identity -v -p codesigning "${KEYCHAIN_PATH}" | awk '/Developer ID Application/ {print $2; exit}')"
          if [[ -z "${codesign_identity}" ]]; then
            echo "::error::No Developer ID Application identity in keychain. Check MAC_CERT_P12_BASE64 / MAC_CERT_PASSWORD and that the .p12 includes the private key." >&2
            exit 1
          fi
          {
            echo "CODESIGN_IDENTITY=${codesign_identity}"
            echo "CODESIGN_KEYCHAIN=${KEYCHAIN_PATH}"
          } >> "${GITHUB_ENV}"
          rm -f cert.p12

      - name: Package server release for macOS or Linux
        if: matrix.package_kind == 'server' && matrix.platform != 'windows'
        shell: bash
        run: ./scripts/package-unix.sh "${{ matrix.platform }}" "${VERSION}"

      - name: Package Linux desktop release
        if: matrix.package_kind == 'desktop' && matrix.platform == 'linux'
        shell: bash
        run: bash ./scripts/package-desktop-unix.sh linux "${VERSION}"

      - name: Package macOS desktop release
        if: matrix.package_kind == 'desktop' && matrix.platform == 'macos'
        shell: bash
        run: bash ./scripts/package-desktop-macos.sh "${VERSION}"

      - name: Notarize macOS desktop DMG
        if: matrix.package_kind == 'desktop' && matrix.platform == 'macos'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          dmg_path="dist/${{ matrix.base_name }}-${{ matrix.platform }}-${VERSION}${{ matrix.archive_ext }}"

          xcrun notarytool store-credentials "notary-profile" \
            --apple-id "${APPLE_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --password "${APPLE_APP_PASSWORD}"

          xcrun notarytool submit "${dmg_path}" \
            --keychain-profile "notary-profile" \
            --wait

          xcrun stapler staple "${dmg_path}"
          xcrun stapler validate "${dmg_path}"

      - name: Package Windows server release
        if: matrix.package_kind == 'server' && matrix.platform == 'windows'
        shell: pwsh
        run: ./scripts/package-windows.ps1 -Version "${env:VERSION}"

      - name: Package Windows desktop release
        if: matrix.package_kind == 'desktop' && matrix.platform == 'windows'
        shell: pwsh
        run: ./scripts/package-desktop-windows.ps1 -Version "${env:VERSION}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.base_name }}-${{ matrix.platform }}-${{ env.VERSION }}
          path: dist/${{ matrix.base_name }}-${{ matrix.platform }}-${{ env.VERSION }}${{ matrix.archive_ext }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find release-assets -type f -print0 | sort -z)

          if [ ${#files[@]} -eq 0 ]; then
              echo "No release files found" >&2
              exit 1
          fi

          if gh release view "${VERSION}" --repo "${GH_REPO}" >/dev/null 2>&1; then
              gh release upload "${VERSION}" "${files[@]}" --clobber --repo "${GH_REPO}"
          else
              gh release create "${VERSION}" "${files[@]}" --generate-notes --title "${VERSION}" --repo "${GH_REPO}"
          fi
