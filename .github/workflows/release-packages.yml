name: Release Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  VERSION: ${{ github.event_name == 'workflow_dispatch' && format('manual-{0}', github.run_number) || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Server
            runner: macos-latest
            platform: macos
            package_kind: server
            base_name: citebox
            archive_ext: .tar.gz
          - label: Linux Server
            runner: ubuntu-latest
            platform: linux
            package_kind: server
            base_name: citebox
            archive_ext: .tar.gz
          - label: Windows Server
            runner: windows-latest
            platform: windows
            package_kind: server
            base_name: citebox
            archive_ext: .zip
          - label: macOS Desktop
            runner: macos-latest
            platform: macos
            package_kind: desktop
            base_name: citebox-desktop
            archive_ext: .tar.gz
          - label: Linux Desktop
            runner: ubuntu-latest
            platform: linux
            package_kind: desktop
            base_name: citebox-desktop
            archive_ext: .tar.gz
          - label: Windows Desktop
            runner: windows-latest
            platform: windows
            package_kind: desktop
            base_name: citebox-desktop
            archive_ext: .zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux desktop build dependencies
        if: matrix.platform == 'linux' && matrix.package_kind == 'desktop'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev pkg-config

          if apt-cache show libwebkit2gtk-4.0-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.1-dev

            if ! pkg-config --exists webkit2gtk-4.0 && pkg-config --exists webkit2gtk-4.1; then
              mkdir -p "${RUNNER_TEMP}/pkgconfig"
              cp "$(pkg-config --variable=pcfiledir webkit2gtk-4.1)/webkit2gtk-4.1.pc" \
                "${RUNNER_TEMP}/pkgconfig/webkit2gtk-4.0.pc"
              echo "PKG_CONFIG_PATH=${RUNNER_TEMP}/pkgconfig${PKG_CONFIG_PATH:+:${PKG_CONFIG_PATH}}" >> "${GITHUB_ENV}"
            fi
          fi

          pkg-config --modversion gtk+-3.0
          pkg-config --modversion webkit2gtk-4.0

      - name: Inspect native Windows desktop toolchain
        if: matrix.platform == 'windows' && matrix.package_kind == 'desktop'
        shell: pwsh
        run: |
          $tools = "gcc", "g++", "clang", "clang++", "cl"
          foreach ($tool in $tools) {
            $cmd = Get-Command $tool -ErrorAction SilentlyContinue
            if ($null -eq $cmd) {
              Write-Host "$tool => not found"
            } else {
              Write-Host "$tool => $($cmd.Source)"
            }
          }
          go env CC CXX CGO_ENABLED

      - name: Package server release for macOS or Linux
        if: matrix.package_kind == 'server' && matrix.platform != 'windows'
        shell: bash
        run: ./scripts/package-unix.sh "${{ matrix.platform }}" "${VERSION}"

      - name: Package desktop release for macOS or Linux
        if: matrix.package_kind == 'desktop' && matrix.platform != 'windows'
        shell: bash
        run: bash ./scripts/package-desktop-unix.sh "${{ matrix.platform }}" "${VERSION}"

      - name: Package Windows server release
        if: matrix.package_kind == 'server' && matrix.platform == 'windows'
        shell: pwsh
        run: ./scripts/package-windows.ps1 -Version "${env:VERSION}"

      - name: Package Windows desktop release
        if: matrix.package_kind == 'desktop' && matrix.platform == 'windows'
        shell: pwsh
        run: ./scripts/package-desktop-windows.ps1 -Version "${env:VERSION}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.base_name }}-${{ matrix.platform }}-${{ env.VERSION }}
          path: dist/${{ matrix.base_name }}-${{ matrix.platform }}-${{ env.VERSION }}${{ matrix.archive_ext }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          files=(release-assets/*)
          if [ ${#files[@]} -eq 0 ]; then
              echo "No release assets found" >&2
              exit 1
          fi

          if gh release view "${VERSION}" --repo "${GH_REPO}" >/dev/null 2>&1; then
              gh release upload "${VERSION}" "${files[@]}" --clobber --repo "${GH_REPO}"
          else
              gh release create "${VERSION}" "${files[@]}" --generate-notes --title "${VERSION}" --repo "${GH_REPO}"
          fi
