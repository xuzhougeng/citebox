<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - CiteBox</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/citebox-icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-warm: #faf8f5;
            --bg-cream: #f5f0e8;
            --ink: #2c2420;
            --ink-light: #5a4d45;
            --muted: #8b7e75;
            --accent: #c17f59;
            --accent-dark: #a66a48;
            --accent-light: #d4a88a;
            --error: #c9544d;
            --success: #6b9e75;
            --shadow-sm: 0 2px 8px rgba(44, 36, 32, 0.04);
            --shadow-md: 0 8px 24px rgba(44, 36, 32, 0.08);
            --shadow-lg: 0 24px 48px rgba(44, 36, 32, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-warm);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 80%;
            height: 120%;
            background: radial-gradient(ellipse at center, rgba(193, 127, 89, 0.08) 0%, transparent 70%);
            animation: float 20s ease-in-out infinite;
        }

        .bg-decoration::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 60%;
            height: 80%;
            background: radial-gradient(ellipse at center, rgba(107, 158, 117, 0.06) 0%, transparent 60%);
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(2deg); }
            66% { transform: translate(-20px, 20px) rotate(-1deg); }
        }

        /* 网格背景 */
        .grid-pattern {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(193, 127, 89, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(193, 127, 89, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* 登录容器 */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }

        /* 登录卡片 */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 
                var(--shadow-lg),
                0 0 0 1px rgba(193, 127, 89, 0.08);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--accent-light), var(--accent));
            background-size: 200% 100%;
            animation: shimmer 3s ease infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Logo 区域 */
        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 12px 24px rgba(193, 127, 89, 0.3),
                0 4px 8px rgba(193, 127, 89, 0.2),
                inset 0 1px 1px rgba(255, 255, 255, 0.3);
            position: relative;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            background: linear-gradient(135deg, rgba(255,255,255,0.4), transparent);
            z-index: -1;
        }

        .logo-icon svg {
            width: 36px;
            height: 36px;
            color: white;
        }

        .brand-name {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .brand-tagline {
            color: var(--muted);
            font-size: 14px;
            font-weight: 400;
        }

        /* 表单区域 */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            font-size: 15px;
            color: var(--ink);
            background: var(--bg-warm);
            border: 2px solid transparent;
            border-radius: 12px;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .form-input::placeholder {
            color: var(--muted);
            opacity: 0.6;
        }

        .form-input:hover {
            background: #fff;
            border-color: rgba(193, 127, 89, 0.2);
        }

        .form-input:focus {
            outline: none;
            background: #fff;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(193, 127, 89, 0.1);
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: var(--muted);
            pointer-events: none;
            transition: color 0.2s ease;
        }

        .form-input:focus + .input-icon {
            color: var(--accent);
        }

        /* 错误提示 */
        .error-message {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(201, 84, 77, 0.08);
            border: 1px solid rgba(201, 84, 77, 0.15);
            border-radius: 10px;
            color: var(--error);
            font-size: 13px;
            font-weight: 500;
        }

        .error-message.show {
            display: flex;
            animation: shake 0.4s ease;
        }

        .error-message svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            40% { transform: translateX(4px); }
            60% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
        }

        /* 登录按钮 */
        .login-button {
            margin-top: 8px;
            padding: 16px 24px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            font-family: inherit;
            box-shadow: 
                0 4px 12px rgba(193, 127, 89, 0.3),
                0 2px 4px rgba(193, 127, 89, 0.2);
        }

        .login-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .login-button:hover::before {
            left: 100%;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 8px 20px rgba(193, 127, 89, 0.35),
                0 4px 8px rgba(193, 127, 89, 0.25);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .button-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .remember-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-top: -4px;
        }

        .remember-toggle {
            display: inline-flex;
            align-items: flex-start;
            gap: 10px;
            cursor: pointer;
            color: var(--ink-light);
            font-size: 13px;
            line-height: 1.5;
        }

        .remember-toggle input {
            width: 16px;
            height: 16px;
            margin-top: 2px;
            accent-color: var(--accent);
            cursor: pointer;
            flex-shrink: 0;
        }

        .remember-copy {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .remember-copy strong {
            color: var(--ink);
            font-weight: 600;
        }

        .remember-copy small {
            color: var(--muted);
        }

        /* 提示信息 */
        .hint-section {
            margin-top: 24px;
            padding: 16px;
            background: linear-gradient(135deg, rgba(193, 127, 89, 0.06) 0%, rgba(193, 127, 89, 0.03) 100%);
            border-radius: 12px;
            border: 1px solid rgba(193, 127, 89, 0.1);
        }

        .hint-text {
            font-size: 13px;
            color: var(--ink-light);
            line-height: 1.6;
            text-align: center;
        }

        .hint-text strong {
            color: var(--accent-dark);
            font-weight: 600;
        }

        .default-creds {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(193, 127, 89, 0.1);
            text-align: center;
        }

        .default-creds-label {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .default-creds-value {
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 13px;
            color: var(--ink-light);
            background: rgba(193, 127, 89, 0.08);
            padding: 6px 12px;
            border-radius: 6px;
            display: inline-block;
        }

        /* 页脚 */
        .login-footer {
            margin-top: 32px;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
        }

        .login-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .login-footer a:hover {
            color: var(--accent-dark);
            text-decoration: underline;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
            }

            .brand-name {
                font-size: 28px;
            }

            .logo-icon {
                width: 64px;
                height: 64px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>
    <div class="grid-pattern"></div>

    <div class="login-wrapper">
        <div class="login-card" id="loginCard">
            <div class="logo-section">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                        <line x1="8" y1="7" x2="16" y2="7"></line>
                        <line x1="8" y1="11" x2="14" y2="11"></line>
                    </svg>
                </div>
                <h1 class="brand-name">CiteBox</h1>
                <p class="brand-tagline">Collect. Cite. Create.</p>
            </div>

            <div class="error-message" id="errorMessage">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <span id="errorText" data-i18n="login.error_default">用户名或密码错误</span>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label" data-i18n="login.username">用户名</label>
                    <div class="input-wrapper">
                        <input
                            type="text"
                            class="form-input"
                            id="usernameInput"
                            placeholder="请输入用户名"
                            data-i18n-placeholder="login.username_placeholder"
                            autocomplete="username"
                            autofocus
                        >
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" data-i18n="login.password">密码</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            class="form-input"
                            id="passwordInput"
                            placeholder="请输入密码"
                            data-i18n-placeholder="login.password_placeholder"
                            autocomplete="current-password"
                        >
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                </div>

                <div class="remember-row">
                    <label class="remember-toggle" for="rememberLoginInput">
                        <input id="rememberLoginInput" type="checkbox">
                        <span class="remember-copy" data-i18n-html="login.remember_login">
                            <strong>记住登录状态</strong>
                            <small>下次访问可直接登录，直到你主动关闭</small>
                        </span>
                    </label>
                </div>

                <button type="submit" class="login-button" id="loginButton">
                    <span class="button-content">
                        <span data-i18n="login.submit">安全登录</span>
                    </span>
                </button>
            </form>

            <div class="hint-section">
                <p class="hint-text" data-i18n-html="login.hint_text">
                    首次登录请使用默认账号密码，登录后可在<strong>配置</strong>页面修改密码
                </p>
                <div class="default-creds">
                    <div class="default-creds-label" data-i18n="login.default_creds_label">默认账号 / 密码</div>
                    <div class="default-creds-value" data-i18n="login.default_creds_value">citebox / citebox123</div>
                </div>
            </div>
        </div>

        <div class="login-footer">
            <p data-i18n-html="login.footer_text">CiteBox &copy; 2024 · Collect. Cite. Create.</p>
        </div>
    </div>

    <script src="/static/js/i18n.js"></script>
    <script>
        if (typeof window.t !== 'function') window.t = function(k,f){return f||k};
        (function() {
            const loginForm = document.getElementById('loginForm');
            const usernameInput = document.getElementById('usernameInput');
            const passwordInput = document.getElementById('passwordInput');
            const rememberLoginInput = document.getElementById('rememberLoginInput');
            const loginButton = document.getElementById('loginButton');
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const loginCard = document.getElementById('loginCard');
            const rememberLoginStorageKey = 'citebox_remember_login_preference';

            function clearLegacyAuthState() {
                sessionStorage.removeItem('citebox_auth');
                localStorage.removeItem('citebox_auth');
                localStorage.removeItem('citebox_logged_in');
                localStorage.removeItem('citebox_username');
                localStorage.removeItem('citebox_password');
            }

            function loadRememberLoginPreference() {
                try {
                    return localStorage.getItem(rememberLoginStorageKey) === '1';
                } catch (error) {
                    return false;
                }
            }

            function saveRememberLoginPreference(enabled) {
                try {
                    localStorage.setItem(rememberLoginStorageKey, enabled ? '1' : '0');
                } catch (error) {
                    // Ignore storage errors and let cookie-based auth remain the source of truth.
                }
            }

            function showError(message) {
                errorText.textContent = message;
                errorMessage.classList.add('show');
                loginCard.style.animation = 'none';
                setTimeout(() => {
                    loginCard.style.animation = 'shake 0.4s ease';
                }, 10);
            }

            function hideError() {
                errorMessage.classList.remove('show');
            }

            async function handleLogin(e) {
                e.preventDefault();
                hideError();

                const username = usernameInput.value.trim();
                const password = passwordInput.value;
                const rememberLogin = Boolean(rememberLoginInput?.checked);

                if (!username || !password) {
                    showError(t('login.err_empty', '请输入用户名和密码'));
                    return;
                }

                loginButton.disabled = true;
                loginButton.innerHTML = '<span class="button-content"><span class="spinner"></span><span>' + t('login.logging_in', '登录中...') + '</span></span>';

                try {
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        credentials: 'same-origin',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            username,
                            password,
                            remember_login: rememberLogin
                        })
                    });
                    const payload = await response.json().catch(() => ({}));

                    if (response.ok) {
                        clearLegacyAuthState();
                        saveRememberLoginPreference(rememberLogin);
                        window.location.href = '/';
                    } else if (response.status === 401) {
                        showError(payload.error || t('login.err_credentials', '用户名或密码错误'));
                        passwordInput.value = '';
                        passwordInput.focus();
                    } else {
                        showError(payload.error || t('login.err_failed', '登录失败，请稍后重试'));
                    }
                } catch (error) {
                    showError(t('msg.network_error', '网络错误，请检查连接'));
                } finally {
                    loginButton.disabled = false;
                    loginButton.innerHTML = '<span class="button-content"><span>' + t('login.submit', '安全登录') + '</span></span>';
                }
            }

            clearLegacyAuthState();
            if (rememberLoginInput) {
                rememberLoginInput.checked = loadRememberLoginPreference();
                rememberLoginInput.addEventListener('change', () => {
                    saveRememberLoginPreference(Boolean(rememberLoginInput.checked));
                });
            }
            loginForm.addEventListener('submit', handleLogin);
            usernameInput.addEventListener('input', hideError);
            passwordInput.addEventListener('input', hideError);
        })();
    </script>
    <script src="/static/js/theme.js"></script>
</body>
</html>
