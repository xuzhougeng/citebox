<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件查看 - CiteBox</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/citebox-icon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body.viewer-page {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(164, 92, 64, 0.2), transparent 20rem),
                linear-gradient(180deg, #2a211d 0%, #17120f 100%);
            color: #fffaf4;
        }

        .viewer-shell {
            display: flex;
            min-height: 100vh;
            flex-direction: column;
        }

        .viewer-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 1rem 1.25rem;
            background: rgba(23, 18, 15, 0.74);
            border-bottom: 1px solid rgba(255, 250, 244, 0.08);
            backdrop-filter: blur(14px);
        }

        .viewer-meta {
            display: flex;
            min-width: 0;
            flex: 1;
            flex-direction: column;
            gap: 0.2rem;
        }

        .viewer-meta span {
            color: rgba(255, 250, 244, 0.65);
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .viewer-meta strong {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 1rem;
        }

        .viewer-toolbar-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .viewer-image-hint {
            color: rgba(255, 250, 244, 0.68);
            font-size: 0.82rem;
        }

        .viewer-stage {
            position: relative;
            display: flex;
            flex: 1;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .viewer-stage.image-mode {
            cursor: default;
        }

        .viewer-image-viewport {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: min(100%, 1600px);
            height: calc(100vh - 8rem);
            overflow: hidden;
            border-radius: 28px;
            background:
                radial-gradient(circle at top left, rgba(164, 92, 64, 0.18), transparent 18rem),
                linear-gradient(180deg, rgba(64, 49, 42, 0.92), rgba(21, 16, 13, 0.98));
            touch-action: none;
            user-select: none;
        }

        .viewer-image-viewport.is-zoomed {
            cursor: grab;
        }

        .viewer-image-viewport.is-dragging {
            cursor: grabbing;
        }

        .viewer-image {
            display: block;
            max-width: 100%;
            max-height: 100%;
            border-radius: 20px;
            box-shadow: 0 36px 96px rgba(0, 0, 0, 0.4);
            cursor: default;
            transform-origin: center center;
            will-change: transform;
            user-select: none;
        }

        .viewer-frame {
            width: 100%;
            height: calc(100vh - 8rem);
            border: none;
            border-radius: 20px;
            background: #fff;
            box-shadow: 0 36px 96px rgba(0, 0, 0, 0.32);
        }

        .viewer-empty {
            max-width: 40rem;
            padding: 2rem;
            border-radius: 24px;
            background: rgba(255, 250, 244, 0.08);
            border: 1px solid rgba(255, 250, 244, 0.12);
            text-align: center;
        }

        .viewer-empty h1 {
            margin: 0 0 0.75rem;
            font-size: 1.4rem;
        }

        .viewer-empty p {
            margin: 0;
            color: rgba(255, 250, 244, 0.72);
            line-height: 1.7;
        }

        @media (max-width: 720px) {
            .viewer-toolbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .viewer-toolbar-actions {
                justify-content: flex-start;
            }

            .viewer-stage {
                padding: 1rem;
            }

            .viewer-image-viewport,
            .viewer-frame {
                height: calc(100vh - 10rem);
            }
        }
    </style>
</head>
<body class="viewer-page">
    <div class="viewer-shell">
        <header class="viewer-toolbar">
            <button id="viewerCloseButton" class="btn btn-outline" type="button">返回</button>
            <div class="viewer-meta">
                <span id="viewerKindLabel">文件查看</span>
                <strong id="viewerTitle">正在加载...</strong>
            </div>
            <div id="viewerToolbarActions" class="viewer-toolbar-actions" hidden>
                <span id="viewerImageHint" class="viewer-image-hint">滚轮缩放，按住左键或中键拖动</span>
                <button id="viewerResetButton" class="btn btn-outline" type="button" disabled>复原视图</button>
            </div>
        </header>
        <main id="viewerStage" class="viewer-stage" aria-live="polite"></main>
    </div>

    <script src="/static/js/viewer.js"></script>
</body>
</html>
