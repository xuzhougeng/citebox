<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配色库 - CiteBox</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/citebox-icon.svg">
    <script>(function(){var d=document.documentElement;try{var t=localStorage.getItem("citebox_theme");if(t&&t!=="warm")d.setAttribute("data-theme",t);var l=localStorage.getItem("citebox_lang")||"zh-CN";d.lang=l;if(l!=="zh-CN")d.setAttribute("data-lang-loading","1");}catch(e){}})()</script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="logo">CiteBox</a>
            <ul class="nav-links">
                <li><a href="/" data-i18n="nav.overview">总览</a></li>
                <li><a href="/library" data-i18n="nav.library">文献库</a></li>
                <li><a href="/figures" data-i18n="nav.figures">图片库</a></li>
                <li><a href="/palettes" class="active" data-i18n="nav.palettes">配色库</a></li>
                <li><a href="/groups" data-i18n="nav.groups">分组</a></li>
                <li><a href="/tags" data-i18n="nav.tags">标签</a></li>
                <li><a href="/notes" data-i18n="nav.notes">笔记</a></li>
                <li><a href="/ai" data-i18n="nav.ai">AI伴读</a></li>
                <li><a href="/settings" data-i18n="nav.settings">配置</a></li>
            </ul>
            <div class="nav-actions">
                <a href="/upload" class="nav-cta" data-i18n="nav.upload_pdf">上传 PDF</a>
            </div>
        </div>
    </nav>

    <main class="page-shell">
        <section class="hero">
            <div>
                <p class="eyebrow">Palette Library</p>
                <h1 data-i18n="palettes.hero_title">浏览子图提取的配色方案</h1>
                <p class="hero-text" data-i18n="palettes.hero_text">这里展示从子图中提取并保存的配色，每一组颜色都可以追溯到来源图片。</p>
            </div>
        </section>

        <section class="filters-card figure-filters-card">
            <div class="filters-card-head">
                <div>
                    <p class="eyebrow">Filter Dock</p>
                    <h2 data-i18n="palettes.filter_title">按来源筛选配色</h2>
                    <p data-i18n="palettes.filter_desc">通过文献标题、子图说明或来源分组查找配色，方便回顾每组颜色的来源。</p>
                </div>
            </div>
            <div class="filters-grid two-cols">
                <label class="field">
                    <span data-i18n="label.keyword">关键词</span>
                    <input id="paletteKeywordInput" class="form-input" type="text" placeholder="文献标题、子图说明、配色名称" data-i18n-placeholder="palettes.filter_keyword_placeholder">
                </label>
                <label class="field">
                    <span data-i18n="palettes.filter_group">来源分组</span>
                    <select id="paletteGroupFilter" class="form-input">
                        <option value="" data-i18n="palettes.filter_all_groups">全部分组</option>
                    </select>
                </label>
                <label class="field">
                    <span data-i18n="palettes.filter_sort">排序方式</span>
                    <select id="paletteSortFilter" class="form-input">
                        <option value="updated_at" data-i18n="palettes.sort_updated_at">按配色更新时间</option>
                        <option value="created_at" data-i18n="palettes.sort_created_at">按配色创建时间</option>
                        <option value="paper_created_at_figure_index" data-i18n="palettes.sort_paper_created_at">按文献创建时间，文献内按 Fig 顺序</option>
                    </select>
                </label>
            </div>
        </section>

        <section class="palette-results-shell">
            <section id="paletteSummaryStrip" class="summary-strip"></section>
            <div class="figure-results-head">
                <div>
                    <p class="eyebrow">Bound Colors</p>
                    <h2 data-i18n="palettes.shelf_title">配色库</h2>
                </div>
                <div id="palettePageControls" class="figure-page-controls"></div>
            </div>
            <section id="paletteGrid" class="palette-preview-grid"></section>
            <div id="palettePagination" class="pagination"></div>
        </section>
    </main>

    <div id="paperModal" class="modal-shell hidden">
        <div class="modal-dialog">
            <button id="closePaperModal" class="modal-close" type="button" aria-label="关闭" data-i18n-aria-label="btn.close">×</button>
            <div id="paperModalBody"></div>
        </div>
    </div>

    <script src="/static/js/theme.js"></script>
    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/paper-viewer.js"></script>
    <script src="/static/js/browser-pages.js"></script>
    <script src="/static/js/figure-viewer.js"></script>
    <script src="/static/js/note-viewer.js"></script>
    <script src="/static/js/translate.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
