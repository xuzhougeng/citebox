<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签 - CiteBox</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/citebox-icon.svg">
    <script>(function(){var t=localStorage.getItem("citebox_theme");if(t&&t!=="warm")document.documentElement.setAttribute("data-theme",t)})()</script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="logo">CiteBox</a>
            <ul class="nav-links">
                <li><a href="/">总览</a></li>
                <li><a href="/library">文献库</a></li>
                <li><a href="/figures">图片库</a></li>
                <li><a href="/palettes">配色库</a></li>
                <li><a href="/groups">分组</a></li>
                <li><a href="/tags" class="active">标签</a></li>
                <li><a href="/notes">笔记</a></li>
                <li><a href="/ai">AI伴读</a></li>
                <li><a href="/settings">配置</a></li>
            </ul>
            <div class="nav-actions">
                <a href="/upload" class="nav-cta">上传 PDF</a>
            </div>
        </div>
    </nav>

    <main class="page-shell">
        <section class="hero compact">
            <div>
                <p class="eyebrow">Tags</p>
                <h1>用标签灵活标记文献和图片</h1>
                <p class="hero-text">文献标签适合标记主题、方法和阅读状态；图片标签适合标记图像内容和实验类型，方便各自检索。</p>
            </div>
        </section>

        <section class="manager-card">
            <div class="manager-head">
                <h2>标签视图</h2>
                <p>切换你当前想浏览的是文献标签还是图片标签。</p>
            </div>
            <div id="tagScopeSwitch" class="card-actions"></div>
            <div class="manager-card-divider"></div>
            <div class="manager-head">
                <h2 id="tagCreatorTitle">新建文献标签</h2>
                <p id="tagCreatorHint">标签适合轻量、多维、可叠加的整理方式。</p>
            </div>
            <form id="tagPageForm" class="manager-form tag-creator-form">
                <label class="field tag-name-field">
                    <span>标签名称</span>
                    <input id="tagPageNameInput" class="form-input" type="text" placeholder="例如：review" aria-label="标签名称">
                </label>
                <div id="tagPresetPanel" class="field tag-preset-panel" hidden>
                    <span class="field-label-text">常用图片标签</span>
                    <p class="tag-color-hint">点击已存在标签会直接筛选，点击未创建标签会按当前颜色新建。</p>
                    <div id="tagPresetList" class="tag-preset-list" role="list" aria-label="常用图片标签"></div>
                </div>
                <div class="field tag-color-field">
                    <span class="field-label-text">标签颜色</span>
                    <p class="tag-color-hint">点击常用颜色，或用左侧色块自定义。</p>
                    <div class="tag-color-control-row">
                        <input id="tagPageColorInput" class="color-input" type="color" value="#A45C40" aria-label="标签颜色" title="选择标签颜色">
                        <div id="tagColorPresetList" class="tag-color-presets" role="listbox" aria-label="常用标签颜色"></div>
                        <button id="tagPageSubmit" class="btn btn-primary tag-creator-submit" type="submit">创建文献标签</button>
                    </div>
                </div>
            </form>
        </section>

        <section class="section-stack stack-spacious">
            <div id="tagCardGrid" class="entity-grid page-entity-grid tag-entity-grid"></div>
            <section class="filters-card">
                <div class="manager-head">
                    <h2 id="tagHeadline">全部文献标签下的文献</h2>
                    <p id="tagScopeHint">点击上方标签列表切换筛选结果。</p>
                </div>
                <div id="tagResultList" class="paper-grid paper-list-mode"></div>
                <div id="tagPagination" class="pagination"></div>
            </section>
        </section>
    </main>

    <div id="paperModal" class="modal-shell hidden">
        <div class="modal-dialog">
            <button id="closePaperModal" class="modal-close" type="button" aria-label="关闭">×</button>
            <div id="paperModalBody"></div>
        </div>
    </div>

    <script src="/static/js/theme.js"></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/paper-viewer.js"></script>
    <script src="/static/js/browser-pages.js"></script>
    <script src="/static/js/figure-viewer.js"></script>
    <script src="/static/js/note-viewer.js"></script>
    <script src="/static/js/translate.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
