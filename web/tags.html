<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签 - CiteBox</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/citebox-icon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="logo">CiteBox</a>
            <ul class="nav-links">
                <li><a href="/">总览</a></li>
                <li><a href="/library">文献库</a></li>
                <li><a href="/figures">图片库</a></li>
                <li><a href="/groups">分组</a></li>
                <li><a href="/tags" class="active">标签</a></li>
                <li><a href="/notes">笔记</a></li>
                <li><a href="/ai">AI伴读</a></li>
                <li><a href="/settings">配置</a></li>
            </ul>
            <div class="nav-actions">
                <a href="/upload" class="nav-cta">上传 PDF</a>
            </div>
        </div>
    </nav>

    <main class="page-shell">
        <section class="hero compact">
            <div>
                <p class="eyebrow">Tags</p>
                <h1>用标签灵活标记文献和图片</h1>
                <p class="hero-text">文献标签适合标记主题、方法和阅读状态；图片标签适合标记图像内容和实验类型，方便各自检索。</p>
            </div>
        </section>

        <section class="manager-card">
            <div class="manager-head">
                <h2>标签视图</h2>
                <p>切换你当前想浏览的是文献标签还是图片标签。</p>
            </div>
            <div id="tagScopeSwitch" class="card-actions"></div>
            <div class="manager-card-divider"></div>
            <div class="manager-head">
                <h2 id="tagCreatorTitle">新建文献标签</h2>
                <p id="tagCreatorHint">标签适合轻量、多维、可叠加的整理方式。</p>
            </div>
            <form id="tagPageForm" class="manager-form inline-form">
                <input id="tagPageNameInput" class="form-input" type="text" placeholder="例如：review">
                <input id="tagPageColorInput" class="color-input" type="color" value="#A45C40">
                <button id="tagPageSubmit" class="btn btn-primary" type="submit">创建文献标签</button>
            </form>
        </section>

        <section class="section-stack stack-spacious">
            <div id="tagCardGrid" class="entity-grid page-entity-grid"></div>
            <section class="filters-card">
                <div class="manager-head">
                    <h2 id="tagHeadline">全部文献标签下的文献</h2>
                    <p id="tagScopeHint">点击上方标签卡片切换筛选结果。</p>
                </div>
                <div id="tagResultList" class="paper-grid paper-list-mode"></div>
                <div id="tagPagination" class="pagination"></div>
            </section>
        </section>
    </main>

    <div id="paperModal" class="modal-shell hidden">
        <div class="modal-dialog">
            <button id="closePaperModal" class="modal-close" type="button" aria-label="关闭">×</button>
            <div id="paperModalBody"></div>
        </div>
    </div>

    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/paper-viewer.js"></script>
    <script src="/static/js/browser-pages.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
