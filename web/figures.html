<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片库 - CiteBox</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/citebox-icon.svg">
    <script>(function(){var t=localStorage.getItem("citebox_theme");if(t&&t!=="warm")document.documentElement.setAttribute("data-theme",t)})()</script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="logo">CiteBox</a>
            <ul class="nav-links">
                <li><a href="/">总览</a></li>
                <li><a href="/library">文献库</a></li>
                <li><a href="/figures" class="active">图片库</a></li>
                <li><a href="/palettes">配色库</a></li>
                <li><a href="/groups">分组</a></li>
                <li><a href="/tags">标签</a></li>
                <li><a href="/notes">笔记</a></li>
                <li><a href="/ai">AI伴读</a></li>
                <li><a href="/settings">配置</a></li>
            </ul>
            <div class="nav-actions">
                <a href="/upload" class="nav-cta">上传 PDF</a>
            </div>
        </div>
    </nav>

    <main class="page-shell">
        <section class="hero">
            <div>
                <p class="eyebrow">Image Library</p>
                <h1>跨文献浏览所有提取图片</h1>
                <p class="hero-text">浏览所有文献中提取的图片，按标签整理，随时回到来源文献。</p>
            </div>
        </section>

        <section class="filters-card figure-filters-card">
            <div class="filters-card-head">
                <div>
                    <p class="eyebrow">Filter Dock</p>
                    <h2>按条件筛选图片</h2>
                    <p>支持按来源分组和图片标签筛选，快速找到目标图片。</p>
                </div>
            </div>
            <div class="filters-grid">
                <label class="field">
                    <span>关键词</span>
                    <input id="figureKeywordInput" class="form-input" type="text" placeholder="文献标题、图片说明、标签、笔记">
                </label>
                <label class="field">
                    <span>来源分组</span>
                    <select id="figureGroupFilter" class="form-input">
                        <option value="">全部分组</option>
                    </select>
                </label>
                <label class="field">
                    <span>图片标签</span>
                    <select id="figureTagFilter" class="form-input">
                        <option value="">全部图片标签</option>
                    </select>
                </label>
                <label class="field">
                    <span>排序方式</span>
                    <select id="figureSortFilter" class="form-input">
                        <option value="created_at">按图片创建时间</option>
                        <option value="paper_created_at_figure_index">按文献创建时间，文献内按 Fig 顺序</option>
                    </select>
                </label>
            </div>
        </section>

        <section class="figure-results-shell">
            <section id="figureSummaryStrip" class="summary-strip"></section>
            <div class="figure-results-head">
                <div>
                    <p class="eyebrow">Library Shelf</p>
                    <h2>图片库</h2>
                </div>
                <div id="figurePageControls" class="figure-page-controls"></div>
            </div>
            <section id="figureGrid" class="figure-preview-grid"></section>
            <div id="figurePagination" class="pagination"></div>
        </section>
    </main>

    <div id="paperModal" class="modal-shell hidden">
        <div class="modal-dialog">
            <button id="closePaperModal" class="modal-close" type="button" aria-label="关闭">×</button>
            <div id="paperModalBody"></div>
        </div>
    </div>

    <div id="figureModal" class="modal-shell hidden">
        <div class="modal-dialog figure-modal-dialog">
            <button id="closeFigureModal" class="modal-close" type="button" aria-label="关闭">×</button>
            <div id="figureModalBody"></div>
        </div>
    </div>

    <script src="/static/js/theme.js"></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/paper-viewer.js"></script>
    <script src="/static/js/browser-pages.js"></script>
    <script src="/static/js/figure-viewer.js"></script>
    <script src="/static/js/note-viewer.js"></script>
    <script src="/static/js/translate.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
