<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔记 - CiteBox</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/citebox-icon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="logo">CiteBox</a>
            <ul class="nav-links">
                <li><a href="/">总览</a></li>
                <li><a href="/library">文献库</a></li>
                <li><a href="/figures">图片库</a></li>
                <li><a href="/groups">分组</a></li>
                <li><a href="/tags">标签</a></li>
                <li><a href="/notes" class="active">笔记</a></li>
                <li><a href="/ai">AI伴读</a></li>
                <li><a href="/settings">配置</a></li>
            </ul>
            <div class="nav-actions">
                <a href="/upload" class="nav-cta">上传 PDF</a>
            </div>
        </div>
    </nav>

    <main class="page-shell">
        <section class="hero">
            <div>
                <p class="eyebrow">Notes Desk</p>
                <h1>管理图片笔记</h1>
                <p class="hero-text">在这里查看和管理所有图片笔记，包括 AI 解读和你的个人批注。</p>
            </div>
        </section>

        <section class="filters-card figure-filters-card">
            <div class="filters-card-head">
                <div>
                    <p class="eyebrow">Notes Filter</p>
                    <h2>筛选带笔记的图片</h2>
                    <p>这里只显示已经写过图片笔记的条目，你可以继续编辑、回看大图或跳转到来源文献。</p>
                </div>
            </div>
            <div class="filters-grid three-cols">
                <label class="field">
                    <span>关键词</span>
                    <input id="notesKeywordInput" class="form-input" type="text" placeholder="文献标题、图片说明、标签、笔记">
                </label>
                <label class="field">
                    <span>来源分组</span>
                    <select id="notesGroupFilter" class="form-input">
                        <option value="">全部分组</option>
                    </select>
                </label>
                <label class="field">
                    <span>图片标签</span>
                    <select id="notesTagFilter" class="form-input">
                        <option value="">全部图片标签</option>
                    </select>
                </label>
            </div>
        </section>

        <section class="notes-results-shell">
            <section id="notesSummaryStrip" class="summary-strip"></section>
            <div class="notes-results-head">
                <div>
                    <p class="eyebrow">Notes Shelf</p>
                    <h2>笔记列表</h2>
                </div>
                <div id="notesPageControls" class="figure-page-controls"></div>
            </div>
            <section id="notesGrid" class="notes-list"></section>
            <div id="notesPagination" class="pagination"></div>
        </section>
    </main>

    <div id="paperModal" class="modal-shell hidden">
        <div class="modal-dialog">
            <button id="closePaperModal" class="modal-close" type="button" aria-label="关闭">×</button>
            <div id="paperModalBody"></div>
        </div>
    </div>

    <script src="/static/js/utils.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/paper-viewer.js"></script>
    <script src="/static/js/browser-pages.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
